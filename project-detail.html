<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f1f1f1;
            color: #212529;
        }

        .detail-container {
            width: 92%;
            max-width: 1400px;
            margin: 40px auto 80px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 28px;
            color: #212529;
            text-decoration: none;
            font-size: 15px;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 0.65;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 60px;
        }

        .gallery-item {
            background: #ddd;
            overflow: hidden;
            aspect-ratio: 4 / 5;
            cursor: pointer;
            border-radius: 2px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.45s ease, filter 0.45s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            filter: brightness(0.95);
        }

        .detail-content {
            max-width: 1200px;
        }

        .project-title {
            font-size: 54px;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 28px;
            color: #111;
        }

        .project-meta {
            font-size: 18px;
            color: #666;
            margin-bottom: 22px;
            line-height: 1.8;
        }

        .project-description {
            font-size: 20px;
            line-height: 1.9;
            color: #1f1f1f;
            max-width: 1280px;
        }

        .project-description p {
            margin-bottom: 14px;
        }

        /* 弹出的预览大图 */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 30px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        .lightbox-close {
            position: absolute;
            top: 18px;
            right: 24px;
            color: #fff;
            font-size: 42px;
            cursor: pointer;
            line-height: 1;
        }

        @media (max-width: 1100px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr);
            }

            .project-title {
                font-size: 42px;
            }

            .project-description {
                font-size: 18px;
            }
        }

        @media (max-width: 768px) {
            .detail-container {
                width: 94%;
                margin-top: 24px;
            }

            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }

            .project-title {
                font-size: 34px;
                margin-bottom: 18px;
            }

            .project-meta {
                font-size: 16px;
                margin-bottom: 16px;
            }

            .project-description {
                font-size: 16px;
                line-height: 1.8;
            }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <div class="gallery" id="gallery"></div>

        <div class="detail-content">
            <h1 class="project-title" id="projectTitle">项目标题</h1>
            <div class="project-meta" id="projectMeta"></div>
            <div class="project-description" id="projectDescription"></div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img id="lightboxImage" src="" alt="预览图">
    </div>

    <script>
        const projectData = {
            1: {
                title: "自动巡逻机器人",
                meta: "智能硬件设计｜机器人感知与导航｜算法开发",
                description: [
                    "一款紧凑型四足/四轮巡逻机器人（0.9米×0.6米×1.2米），设计用于自主室内外巡逻、异常检测，以及城市公园中的人类互动。",
                    "作为核心算法开发者，我设计并实现了感知骨干——涵盖地图绘制、定位和多传感器融合——并领导了自主导航和行为人工智能模块的开发。"
                ],
                images: [
                    "images/robot1.jpg",
                    "images/robot2.jpg",
                    "images/robot3.jpg",
                    "images/robot4.jpg",
                    "images/robot5.jpg"
                ]
            },
            2: {
                title: "国家植物园芍药展",
                meta: "文创设计｜视觉识别｜展览传播",
                description: [
                    "项目围绕国家植物园芍药展展开，提炼芍药花形、植物意象与展览氛围，构建统一的视觉识别与文创表达体系。",
                    "设计内容涵盖海报、周边衍生品、展示界面及主题视觉延展，强调植物展览的审美传播、品牌辨识度与场景应用效果。"
                ],
                images: [
                    "images/project1-1.jpg",
                    "images/project1-2.jpg",
                    "images/project1-3.jpg",
                    "images/project1-4.jpg",
                    "images/project1-5.jpg"
                ]
            },
            3: {
                title: "浑源古城景区旅游总体规划",
                meta: "景区规划｜文化遗产｜游线组织",
                description: [
                    "项目围绕浑源古城的历史文化资源、旅游动线和节点系统展开，构建兼具保护与活化的整体规划框架。",
                    "重点处理古城空间结构梳理、核心景点串联、游客体验优化与在地文化传播，形成可实施、可运营、可传播的景区总体规划方案。"
                ],
                images: [
                    "images/project2-1.jpg",
                    "images/project2-2.jpg",
                    "images/project2-3.jpg",
                    "images/project2-4.jpg",
                    "images/project2-5.jpg"
                ]
            },
            4: {
                title: "平谷区峪口镇乡村景观规划",
                meta: "乡村振兴｜景观规划｜公共空间提升",
                description: [
                    "基于乡村产业基础、田园景观资源与村庄空间形态，对平谷区峪口镇进行系统性的乡村景观规划设计。",
                    "通过节点营造、游线组织、公共空间提升与乡村特色塑造，增强乡村空间品质、游览吸引力与落地实施性。"
                ],
                images: [
                    "images/project3-1.jpg",
                    "images/project3-2.jpg",
                    "images/project3-3.jpg",
                    "images/project3-4.jpg",
                    "images/project3-5.jpg"
                ]
            },
            5: {
                title: "个人手绘作品集",
                meta: "手绘表达｜空间草图｜视觉叙事",
                description: [
                    "作品集收录景观设计草图、节点推敲图、空间透视与概念表达，展示从前期构思到方案深化的全过程。",
                    "强调画面构图、空间层次、透视表达与个人视觉语言，体现手绘在设计思考与方案表达中的价值。"
                ],
                images: [
                    "images/sketch1.jpg",
                    "images/sketch2.jpg",
                    "images/sketch3.jpg",
                    "images/sketch4.jpg",
                    "images/sketch5.jpg"
                ]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id") || "1";
        const project = projectData[id] || projectData["1"];

        const gallery = document.getElementById("gallery");
        const projectTitle = document.getElementById("projectTitle");
        const projectMeta = document.getElementById("projectMeta");
        const projectDescription = document.getElementById("projectDescription");

        const lightbox = document.getElementById("lightbox");
        const lightboxImage = document.getElementById("lightboxImage");
        const lightboxClose = document.getElementById("lightboxClose");

        projectTitle.textContent = project.title;
        projectMeta.textContent = project.meta;
        projectDescription.innerHTML = project.description
            .map(text => `<p>${text}</p>`)
            .join("");

        project.images.forEach(src => {
            const item = document.createElement("div");
            item.className = "gallery-item";
            item.innerHTML = `<img src="${src}" alt="${project.title}">`;

            item.addEventListener("click", () => {
                lightboxImage.src = src;
                lightbox.classList.add("active");
            });

            gallery.appendChild(item);
        });

        lightboxClose.addEventListener("click", () => {
            lightbox.classList.remove("active");
        });

        lightbox.addEventListener("click", (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove("active");
            }
        });
    </script>
</body>
</html>
